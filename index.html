<html lang="en">

<body>

  <div class="app">

    <div class="title-bar">

    </div>

    <div class="content">

      <button onclick="window.location.href='choose.html'">Start</button>
    </div>

  </div>

  <script>
    
    document.getElementById("min-btn").onclick = () => {
      currentWindow.minimize();

      currentWindow.close();
    };
    const { ipcRenderer } = require('electron');

  document.getElementById("min-btn").addEventListener("click", () => {

</body>
</html>
